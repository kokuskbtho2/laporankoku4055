<!doctype html>
<html lang="ms" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pelaporan Aktiviti Kokurikulum</title>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 <style>
  * { font-family: 'Poppins', sans-serif; }
  body { background: #F5E6D3; }
  
  /* Preview Gambar Tetap Cantik */
  .preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover !important; 
    border-radius: 8px;
  }

  .a4-container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Efek Focus Lebih Jelas */
  input:focus, textarea:focus, select:focus {
    outline: none;
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.4);
  }

  /* Sembunyikan elemen masa print */
  @media print {
    .no-print { display: none !important; }
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #991B1B; }
  ::-webkit-scrollbar-thumb { background: #DC2626; border-radius: 10px; }
</style>

<body class="min-h-screen py-4 md:py-10 px-3 md:px-6">
  <div id="app-wrapper" class="w-full max-w-4xl mx-auto">
    <div class="a4-container shadow-2xl rounded-2xl md:rounded-[2rem] overflow-hidden relative border-4 border-white/10" style="background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);">
      
      <form id="reportForm" class="relative z-10 px-5 md:px-12 py-10 space-y-8">
        <div class="text-center space-y-4">
          <img src="https://i.imgur.com/DLy3jZn.png" alt="Logo" class="w-20 h-20 md:w-28 md:h-28 mx-auto drop-shadow-2xl">
          <div class="text-white">
            <h1 class="text-xl md:text-3xl font-extrabold tracking-tight leading-tight">LAPORAN AKTIVITI KOKURIKULUM</h1>
            <h2 class="text-md md:text-xl font-medium opacity-80 uppercase">SK Bandar Tun Hussein Onn 2</h2>
          </div>
          
          <div class="flex flex-col sm:flex-row justify-center items-center gap-3 mt-6">
            <div class="w-full sm:w-auto bg-white/15 backdrop-blur-md rounded-xl px-4 py-3 shadow-lg flex items-center border border-white/20">
              <label class="text-white font-bold mr-3 text-xs md:text-sm whitespace-nowrap">UNIT:</label>
              <input type="text" id="editableUnit" placeholder="Taip Nama Unit" class="bg-transparent border-b border-white/50 text-white placeholder:text-white/50 uppercase text-xs md:text-sm font-bold w-full focus:outline-none">
            </div>
            <div class="w-full sm:w-auto bg-white/15 backdrop-blur-md rounded-xl px-4 py-3 shadow-lg flex items-center border border-white/20">
              <label class="text-white font-bold mr-3 text-xs md:text-sm whitespace-nowrap">KALI KE:</label>
              <select id="perjumpaanKali" class="bg-transparent border-b border-white/50 text-white font-bold text-xs md:text-sm focus:outline-none cursor-pointer">
                <option value="" class="text-black">-</option>
                <script>for(let i=1;i<=12;i++) document.write(`<option value="${i}" class="text-black">${i}</option>`);</script>
              </select>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-white">
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest opacity-80 ml-1">📅 Tarikh</label>
            <input type="date" id="tarikh" class="w-full p-4 rounded-xl bg-white text-gray-900 font-semibold shadow-xl" required>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest opacity-80 ml-1">📍 Tempat</label>
            <input type="text" id="tempat" placeholder="Cth: Dewan Gemilang" class="w-full p-4 rounded-xl bg-white text-gray-900 font-semibold shadow-xl" required>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest opacity-80 ml-1">⏰ Masa</label>
            <div class="flex gap-2">
              <input type="text" id="masa" placeholder="Cth: 2:30" class="flex-1 p-4 rounded-xl bg-white text-gray-900 font-semibold shadow-xl" required>
              <select id="masaWaktu" class="p-4 rounded-xl bg-white text-gray-900 font-bold shadow-xl cursor-pointer">
                <option value="pagi">AM</option>
                <option value="petang" selected>PM</option>
              </select>
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest opacity-80 ml-1">👥 Kehadiran</label>
            <div class="flex items-center gap-3">
              <input type="number" id="ahliHadir" placeholder="Hadir" class="w-full p-4 rounded-xl bg-white text-gray-900 font-semibold shadow-xl text-center" required>
              <span class="font-black text-2xl">/</span>
              <input type="number" id="jumlahAhli" placeholder="Jumlah" class="w-full p-4 rounded-xl bg-white text-gray-900 font-semibold shadow-xl text-center" required>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-widest opacity-80 text-white ml-1">📝 Tajuk Aktiviti</label>
          <input type="text" id="tajukAktiviti" placeholder="TAIP TAJUK DI SINI" class="w-full p-4 rounded-xl bg-white text-red-700 uppercase font-black shadow-xl" required>
        </div>

        <div class="bg-black/20 backdrop-blur-sm rounded-2xl p-5 border border-white/10">
          <h3 class="text-white font-bold mb-4 flex items-center gap-3 text-sm md:text-base">
            <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" /></svg>
            SENARAI GURU PENASIHAT
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="guruContainer"></div>
        </div>

        <div class="space-y-4">
            <h3 class="text-white font-bold text-sm tracking-widest uppercase opacity-80">🖼️ Gambar Aktiviti</h3>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <script>
                    for(let i=1; i<=4; i++) {
                        document.write(`
                            <div class="relative group aspect-square bg-white/10 rounded-2xl overflow-hidden border-2 border-dashed border-white/30 hover:border-white transition-all flex items-center justify-center">
                                <input type="file" id="gambar${i}" accept="image/*" class="hidden" onchange="previewImage(this, 'preview${i}')">
                                <label for="gambar${i}" id="preview${i}" class="cursor-pointer w-full h-full flex flex-col items-center justify-center text-white p-3 text-center">
                                    <svg class="w-8 h-8 mb-2 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    <span class="text-[10px] font-bold uppercase tracking-tighter opacity-50">Muat Naik Foto ${i}</span>
                                </label>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-5">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest opacity-80 text-white ml-1">💡 Refleksi & Impak</label>
                <textarea id="refleksi" placeholder="Apa yang murid pelajari hari ini?" class="w-full p-4 rounded-xl bg-white text-gray-900 shadow-xl h-28 resize-none"></textarea>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest opacity-80 text-white ml-1">✍️ Ulasan Guru</label>
                <textarea id="ulasan" placeholder="Catatan tambahan guru..." class="w-full p-4 rounded-xl bg-white text-gray-900 shadow-xl h-28 resize-none"></textarea>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-10 border-t border-white/20">
            <div class="text-center space-y-3">
                <p class="text-white font-bold text-xs uppercase tracking-widest">Disediakan Oleh:</p>
                <input type="text" id="namaMurid" placeholder="NAMA SETIAUSAHA" class="w-full bg-white p-3 rounded-xl text-center font-bold uppercase text-red-700 shadow-lg text-sm">
            </div>
            <div class="text-center space-y-3">
                <p class="text-white font-bold text-xs uppercase tracking-widest">Disemak Oleh:</p>
                <input type="text" id="namaPenyemak" placeholder="NAMA GURU PENASIHAT" class="w-full bg-white p-3 rounded-xl text-center font-bold uppercase text-red-700 shadow-lg text-sm">
            </div>
        </div>

        <div class="text-center pt-8 no-print pb-4">
          <button type="button" id="printBtn" class="w-full md:w-auto bg-white text-red-700 px-12 py-5 rounded-2xl font-black shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-4 mx-auto text-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
            CETAK LAPORAN
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Data Guru (Senarai diringkaskan, sila letak senarai penuh anda di sini)
    const teachersList =  "ABDUL KAHAR BIN AWANG SEMAN",
      "AINA ATHIRAH BINTI AHMAD SENARI",
      "AMIRAH BINTI MOHD ALWI",
      "AMINUDDIN BIN ISMAIL",
      "ARINAWATI BINTI MOHD YAH",
      "AWATIF BINTI MD YUSOP",
      "AZHAIRIN ZULAIHAN BINTI BADRUL HISHAM",
      "AZIMA BINTI MAT ZIN @ ISMAIL",
      "AZIZAH BINTI MOHAMMED",
      "AZMAN BIN OTHMAN",
      "DINITA A/P MUNIANDY",
      "EMIL NORULHUDA BINTI AMIRUDDIN",
      "FAIZA BINTI HASBULLAH",
      "FAIZAH BINTI IBRAHIM",
      "FARAWAHIDA BINTI MOHD SAFFUAN",
      "FARIDATUL AKMAAR BINTI MAT SAID",
      "FATIN FARHANA BINTI AMINUDDIN",
      "HAFIZI BIN OMAR",
      "HARISAH BINTI AWANG",
      "HARIZ IRFAN BIN HUSSIN PAKRI",
      "HASMAWATI BINTI OTHMAN",
      "HAZRAH BINTI MOHAMAD",
      "IRDINA AFIQAH BINTI ISMAIL",
      "IRMA AZNITA BINTI KAMBALI",
      "KANG CHIN KOAT",
      "KASUMMA BINTI PANDAK KAMAL",
      "MARYANI BINTI DRAMAN",
      "MAWADDAH HUDA BINTI MOHD AFFANDI",
      "MAZILA HAZLIN BINTI ABD MAJIT",
      "MOHAMAD MUNIR BIN ZAINUN",
      "MOHAMED SYAKIR BIN MD TAHIR",
      "MOHD SHAMILULHAYAT BIN MOHD ASRI",
      "MUHAMMAD AKASYAH SAIDON",
      "MUHAMMAD IRFAN WAZIF BIN MOHD NIZAM",
      "NADIAH BINTI IDRIS",
      "NAIM AISAMUDDIN BIN ABDUL RAZAK",
      "NAZIMATUL AMANI BINTI RAMLI",
      "NIK HAZIMAN BIN CHE DAUD",
      "NIK NUR LIYANA BINTI NIK MOHD FAUZI",
      "NITHILA A/P JAKANATHAN",
      "NOOR AZIZAH BINTI MD BAHARUDDIN",
      "NORAIDA BINTI MUSTAPHA",
      "NORAMANI BINTI MAT NOR",
      "NORMA BINTI ISMAIL",
      "NORUL HUDA BINTI JAMIN",
      "NOUR EZIEZAH BINTI MAZMAN",
      "NUR FATHIN BINTI ZAKI",
      "NUR SYAFIQAH BINTI ZAHIRUDIN",
      "NUR ZURIYATIE BINTI AZIZ",
      "NURUL HAZIQAH BINTI RAMLI",
      "NURUL ULYA BINTI NORDIN",
      "PIRAKAS A/L SHANGAR",
      "ROHAIZA BINTI RAZALI",
      "RUBINA BINTI RAMLI",
      "SAHARINA BINTI ABDULLAH",
      "SITI HAWA BINTI MAT YAJID",
      "SITI MASHITAH BINTI MOHD ASRI",
      "SITI NORASYIKIN BINTI ABDULLAH",
      "SITI NUR DIANA BINTI MOHAMAD NASIR",
      "SULAIMAN BIN HASSAN",
      "SUZILA BINTI MOHD NOR",
      "TG IHTIFAZUDDIN BIN TG IBRAHIM",
      "UMI NUR HANIRA BINTI ISMAIL",
      "WAN FAIRIS BIN A. KAMAR",
      "ZABIDI BIN MOHAMMAD",
      "ZANIRAH BINTI A. BAKAR"
    ];

    function generateGuruFields() {
      const container = document.getElementById('guruContainer');
      for (let i = 1; i <= 10; i++) {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-2';
        div.innerHTML = `
          <span class="text-white/80 font-bold text-xs">${i}.</span>
          <select id="guru${i}" class="w-full p-2 rounded bg-white/90 text-xs focus:bg-white focus:outline-none">
            <option value="">-- Pilih Guru --</option>
            ${teachersList.map(t => `<option value="${t}">${t}</option>`).join('')}
          </select>`;
        container.appendChild(div);
      }
    }

    function previewImage(input, previewId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" class="preview-img">`;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

function generatePDFPreview() {
      const data = {
        unit: document.getElementById('editableUnit').value || 'UNIT BERUNIFORM',
        perjumpaanKali: document.getElementById('perjumpaanKali').value,
        tarikh: document.getElementById('tarikh').value,
        tempat: document.getElementById('tempat').value,
        masa: document.getElementById('masa').value + ' ' + document.getElementById('masaWaktu').value,
        hadir: document.getElementById('ahliHadir').value + ' / ' + document.getElementById('jumlahAhli').value,
        tajuk: document.getElementById('tajukAktiviti').value || '-',
        guru: Array.from({length:10}, (_,i) => document.getElementById(`guru${i+1}`).value).filter(v => v),
        objektif: [document.getElementById('objektif1').value, document.getElementById('objektif2').value].filter(v => v),
        refleksi: document.getElementById('refleksi').value,
        ulasan: document.getElementById('ulasan').value,
        murid: document.getElementById('namaMurid').value,
        penyemak: document.getElementById('namaPenyemak').value,
        gambar: Array.from({length:4}, (_,i) => {
            const img = document.getElementById(`preview${i+1}`).querySelector('img');
            return img ? img.src : null;
        }).filter(v => v)
      };

      const pdfWin = window.open('', '_blank');
      pdfWin.document.write(`
        <html>
        <head>
          <title>Laporan - ${data.tajuk}</title>
          <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
          <style>
            /* Kunci Saiz Kertas */
            @page { 
              size: A4 portrait; 
              margin: 0; 
            }
            * { box-sizing: border-box; }
            
            body { 
              margin: 0; padding: 0; 
              font-family: 'Poppins', sans-serif;
              width: 210mm; 
              height: 297mm;
              position: relative;
              overflow: hidden; /* Halang page ke-2 */
            }
            
            .bg-full {
              position: absolute;
              top: 0; left: 0;
              width: 210mm; height: 297mm;
              z-index: -1;
              object-fit: cover;
            }

            .content { 
              position: relative;
              z-index: 10;
              padding: 10mm 15mm; /* Padding dikecilkan sikit untuk ruang */
              color: white; 
              height: 297mm;
              display: flex;
              flex-direction: column;
            }
            
            .header-img { width: 60px; display: block; margin: 0 auto 5px; }
            .title { text-align: center; margin-bottom: 10px; }
            
            .info-box { 
              background: white !important; 
              color: black; border-radius: 8px; padding: 8px; 
              display: grid; grid-template-columns: 1fr 1fr; gap: 5px; 
              margin-bottom: 10px;
              -webkit-print-color-adjust: exact !important;
            }
            
            .label { font-weight: 700; font-size: 7pt; color: #DC2626; text-transform: uppercase; }
            .val { font-weight: 600; font-size: 8pt; }
            
            .section-title { 
              font-weight: 700; 
              border-bottom: 1.5px solid rgba(255,255,255,0.4); 
              margin: 8px 0 4px; 
              font-size: 8.5pt; 
              text-transform: uppercase;
            }
            
            .white-card { 
              background: white !important; 
              color: black; padding: 6px 10px; border-radius: 6px; 
              font-size: 7.5pt; font-weight: 600;
              -webkit-print-color-adjust: exact !important;
              line-height: 1.2;
            }
            
            .guru-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
            .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 3px; }
            
            .img-item { 
              background: white !important; 
              padding: 3px; border-radius: 4px; text-align: center;
              -webkit-print-color-adjust: exact !important;
            }
            .img-item img { width: 100%; height: 80px; object-fit: cover; display: block; }
            .img-cap { font-size: 6pt; color: black; font-weight: bold; margin-top: 2px; }
            
            .footer-sig { 
              display: grid; 
              grid-template-columns: 1fr 1fr; 
              gap: 30px; 
              margin-top: auto; /* Tolak ke paling bawah */
              margin-bottom: 10mm;
              text-align: center; 
            }
            .sig-line { border-top: 1.5px solid white; margin-top: 30px; padding-top: 3px; font-weight: 700; font-size: 8pt; }
            
            @media print { .no-print { display: none; } }
          </style>
        </head>
        <body onload="window.print()">
          <img src="https://i.imgur.com/j5Ojna9.png" class="bg-full">

          <div class="content">
            <img src="https://i.imgur.com/DLy3jZn.png" class="header-img">
            <div class="title">
                <div style="font-size: 12pt; font-weight: 700;">LAPORAN AKTIVITI KOKURIKULUM</div>
                <div style="font-size: 8.5pt;">SK BANDAR TUN HUSSEIN ONN 2</div>
                <div style="margin-top:4px;"><span style="background:white !important; color:red; padding:2px 10px; border-radius:10px; font-weight:700; font-size:7pt; -webkit-print-color-adjust: exact !important;">UNIT: ${data.unit} (KALI KE-${data.perjumpaanKali})</span></div>
            </div>

            <div class="info-box">
                <div><div class="label">Tarikh</div><div class="val">${data.tarikh}</div></div>
                <div><div class="label">Tempat</div><div class="val">${data.tempat}</div></div>
                <div><div class="label">Masa</div><div class="val">${data.masa}</div></div>
                <div><div class="label">Kehadiran</div><div class="val">${data.hadir} Orang</div></div>
            </div>

            <div class="section-title">TAJUK AKTIVITI</div>
            <div class="white-card" style="text-transform: uppercase; color: #DC2626;">${data.tajuk}</div>

            <div class="section-title">SENARAI GURU</div>
            <div class="white-card">
                <div class="guru-grid">
                    ${data.guru.map((g,i) => `<div>${i+1}. ${g}</div>`).join('')}
                </div>
            </div>

            <div class="section-title">GAMBAR AKTIVITI</div>
            <div class="img-grid">
                ${data.gambar.map((src,i) => `
                    <div class="img-item">
                        <img src="${src}">
                        <div class="img-cap">GAMBAR ${i+1}</div>
                    </div>
                `).join('')}
            </div>

            <div class="section-title">REFLEKSI & ULASAN</div>
            <div class="white-card" style="margin-bottom:5px;">${data.refleksi || '-'}</div>
            <div class="white-card">${data.ulasan || '-'}</div>

            <div class="footer-sig">
                <div>
                    <div style="font-size: 7pt;">Disediakan Oleh:</div>
                    <div class="sig-line">${data.murid || '........................................'}</div>
                    <div style="font-size: 6pt; opacity: 0.9;">SETIAUSAHA UNIT</div>
                </div>
                <div>
                    <div style="font-size: 7pt;">Disemak Oleh:</div>
                    <div class="sig-line">${data.penyemak || '........................................'}</div>
                    <div style="font-size: 6pt; opacity: 0.9;">GURU PENASIHAT</div>
                </div>
            </div>
          </div>
        </body>
        </html>
      `);
      pdfWin.document.close();
    }

    document.getElementById('printBtn').onclick = generatePDFPreview;
    window.onload = generateGuruFields;
  </script>
</body>
</html>
