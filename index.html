<!doctype html>
<html lang="ms" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Aktiviti Kokurikulum SKBTHO2</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body { background: #F5E6D3; margin: 0; padding: 0; }
    
    /* FIX LOGO: contain supaya tak penyet */
    .logo-header {
      width: 100px;
      height: 100px;
      object-fit: contain !important;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    /* FIX PREVIEW GAMBAR: cover supaya penuh kotak */
    .preview-img {
      width: 100%;
      height: 100%;
      object-fit: cover !important;
      border-radius: 8px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @media print {
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="py-6 px-4">
  <div class="max-w-4xl mx-auto shadow-2xl rounded-3xl overflow-hidden relative" style="background: linear-gradient(135deg, #DC2626 0%, #7F1D1D 100%);">
    
    <form id="reportForm" class="relative z-10 p-6 md:p-10 space-y-8">
      <div class="text-center space-y-4">
        <img src="https://i.imgur.com/DLy3jZn.png" alt="Logo SKBTHO2" class="logo-header mx-auto">
        <div class="text-white">
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight">LAPORAN AKTIVITI KOKURIKULUM</h1>
          <h2 class="text-lg opacity-90">SK BANDAR TUN HUSSEIN ONN 2</h2>
        </div>
        
        <div class="flex flex-wrap justify-center gap-4 mt-6">
          <div class="bg-white rounded-full px-5 py-2 shadow-lg flex items-center">
            <span class="text-red-700 font-bold text-sm mr-2">UNIT:</span>
            <input type="text" id="editableUnit" placeholder="NAMA UNIT" class="bg-transparent border-b border-red-200 uppercase text-sm font-bold w-48 focus:border-red-600 transition-colors">
          </div>
          <div class="bg-white rounded-full px-5 py-2 shadow-lg flex items-center">
            <span class="text-red-700 font-bold text-sm mr-2">PERJUMPAAN KE:</span>
            <select id="perjumpaanKali" class="bg-transparent font-bold text-sm focus:outline-none">
              <script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}</option>`);</script>
            </select>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-white">
        <div class="space-y-2">
          <label class="block text-sm font-semibold ml-1">Tarikh</label>
          <input type="date" id="tarikh" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/50 focus:bg-white/30 transition-all" required>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold ml-1">Tempat</label>
          <input type="text" id="tempat" placeholder="Contoh: Dataran Perhimpunan" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/50" required>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold ml-1">Masa</label>
          <div class="flex gap-2">
            <input type="text" id="masa" placeholder="Contoh: 2:30 - 4:30" class="flex-1 p-3 rounded-xl bg-white/20 border border-white/30 text-white" required>
            <select id="masaWaktu" class="p-3 rounded-xl bg-red-800 border border-white/30 text-white">
              <option value="pagi">Pagi</option>
              <option value="petang" selected>Petang</option>
            </select>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold ml-1">Kehadiran Ahli</label>
          <div class="flex items-center gap-3">
            <input type="number" id="ahliHadir" placeholder="Hadir" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 text-white text-center" required>
            <span class="font-bold">/</span>
            <input type="number" id="jumlahAhli" placeholder="Jumlah" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 text-white text-center" required>
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold text-white ml-1">Tajuk Aktiviti</label>
        <input type="text" id="tajukAktiviti" placeholder="Contoh: MESYUARAT AGUNG TAHUNAN" class="w-full p-4 rounded-xl bg-white/20 border border-white/30 text-white uppercase font-bold text-lg tracking-wide focus:bg-white/30" required>
      </div>

      <div class="glass-card rounded-2xl p-6">
        <h3 class="text-white font-bold mb-4 flex items-center gap-2 underline decoration-red-400">
          SENARAI GURU PENASIHAT
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="guruContainer"></div>
      </div>

      <div class="space-y-4">
        <h3 class="text-white font-bold flex items-center gap-2">OBJEKTIF AKTIVITI</h3>
        <input type="text" id="objektif1" placeholder="Objektif 1" class="w-full p-3 rounded-xl bg-white/90 text-gray-800 shadow-lg">
        <input type="text" id="objektif2" placeholder="Objektif 2" class="w-full p-3 rounded-xl bg-white/90 text-gray-800 shadow-lg">
      </div>

      <div class="space-y-4">
        <h3 class="text-white font-bold flex items-center gap-2">GAMBAR AKTIVITI (MAKS 4)</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <script>
            for(let i=1; i<=4; i++) {
              document.write(`
                <div class="relative aspect-square bg-white/10 rounded-2xl border-2 border-dashed border-white/30 hover:border-white/60 transition-all flex items-center justify-center overflow-hidden">
                  <input type="file" id="gambar${i}" accept="image/*" class="hidden" onchange="previewImage(this, 'preview${i}')">
                  <label for="gambar${i}" id="preview${i}" class="cursor-pointer w-full h-full flex flex-col items-center justify-center text-white/50 hover:text-white transition-colors">
                    <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                    <span class="text-[10px] font-bold">GAMBAR ${i}</span>
                  </label>
                </div>
              `);
            }
          </script>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-white font-bold text-sm">REFLEKSI / IMPAK</label>
          <textarea id="refleksi" class="w-full p-4 rounded-xl bg-white/90 text-gray-800 h-32 shadow-lg" placeholder="Nyatakan impak aktiviti..."></textarea>
        </div>
        <div class="space-y-2">
          <label class="text-white font-bold text-sm">ULASAN GURU</label>
          <textarea id="ulasan" class="w-full p-4 rounded-xl bg-white/90 text-gray-800 h-32 shadow-lg" placeholder="Ulasan keseluruhan..."></textarea>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-10 border-t border-white/20">
        <div class="text-center space-y-3">
          <p class="text-white font-bold text-sm">DISEDIAKAN OLEH:</p>
          <input type="text" id="namaMurid" placeholder="NAMA SETIAUSAHA" class="w-full bg-white p-3 rounded-lg text-center font-bold uppercase text-red-800">
        </div>
        <div class="text-center space-y-3">
          <p class="text-white font-bold text-sm">DISEMAK OLEH:</p>
          <input type="text" id="namaPenyemak" placeholder="NAMA GURU PENASIHAT" class="w-full bg-white p-3 rounded-lg text-center font-bold uppercase text-red-800">
        </div>
      </div>

      <div class="text-center pt-8 no-print">
        <button type="button" id="printBtn" class="bg-yellow-400 hover:bg-yellow-300 text-red-900 px-12 py-4 rounded-full font-extrabold text-lg shadow-[0_10px_20px_rgba(0,0,0,0.3)] hover:scale-105 active:scale-95 transition-all flex items-center gap-3 mx-auto">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" stroke-width="2"/></svg>
          JANA LAPORAN (PDF)
        </button>
        <p class="text-white/60 text-[10px] mt-4">Sila pastikan "Background Graphics" ditanda jika imej tidak muncul di preview cetakan.</p>
      </div>
    </form>
  </div>

  <script>
    // Senarai Guru
    const teachersList = [
      "ABDUL KAHAR BIN AWANG SEMAN", "AINA ATHIRAH BINTI AHMAD SENARI", 
      "AMIRAH BINTI MOHD ALWI", "AZLINA BINTI MOHAMED", "MOHD HAFIZ BIN RAMLI"
    ]; 

    function generateGuruFields() {
      const container = document.getElementById('guruContainer');
      for (let i = 1; i <= 10; i++) {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-2';
        div.innerHTML = `
          <span class="text-white/60 text-xs font-bold w-4">${i}.</span>
          <select id="guru${i}" class="w-full p-2 rounded-lg bg-white/90 text-[11px] font-semibold text-gray-800 focus:bg-white">
            <option value="">-- Pilih Guru --</option>
            ${teachersList.map(t => `<option value="${t}">${t}</option>`).join('')}
          </select>`;
        container.appendChild(div);
      }
    }

    function previewImage(input, previewId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" class="preview-img">`;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function generatePDFPreview() {
      const data = {
        unit: document.getElementById('editableUnit').value || 'KOKURIKULUM',
        kali: document.getElementById('perjumpaanKali').value,
        tarikh: document.getElementById('tarikh').value,
        tempat: document.getElementById('tempat').value,
        masa: document.getElementById('masa').value + ' ' + document.getElementById('masaWaktu').value,
        hadir: document.getElementById('ahliHadir').value + ' / ' + document.getElementById('jumlahAhli').value,
        tajuk: document.getElementById('tajukAktiviti').value || '-',
        guru: Array.from({length:10}, (_,i) => document.getElementById(`guru${i+1}`).value).filter(v => v),
        objektif: [document.getElementById('objektif1').value, document.getElementById('objektif2').value].filter(v => v),
        refleksi: document.getElementById('refleksi').value,
        ulasan: document.getElementById('ulasan').value,
        murid: document.getElementById('namaMurid').value,
        penyemak: document.getElementById('namaPenyemak').value,
        gambar: Array.from({length:4}, (_,i) => {
            const img = document.getElementById(`preview${i+1}`).querySelector('img');
            return img ? img.src : null;
        }).filter(v => v)
      };

      const pdfWin = window.open('', '_blank');
      pdfWin.document.write(`
        <html>
        <head>
          <title>Laporan_Kokurikulum_${data.unit}</title>
          <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
          <style>
            @page { size: A4 portrait; margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
            body { 
              margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
              background: url('https://i.imgur.com/j5Ojna9.png') no-repeat center center;
              background-size: cover; width: 210mm; height: 297mm;
            }
            .page-container { position: relative; width: 210mm; height: 297mm; overflow: hidden; }
            .content { position: relative; z-index: 10; padding: 15mm 20mm; color: white; }
            .logo-pdf { width: 80px; height: auto; display: block; margin: 0 auto 10px; object-fit: contain; }
            .text-center { text-align: center; }
            .header-title { font-size: 16pt; font-weight: 700; margin-bottom: 2px; }
            .header-sub { font-size: 11pt; font-weight: 600; margin-bottom: 15px; }
            .badge { background: white; color: #DC2626; padding: 4px 15px; border-radius: 20px; font-weight: 800; font-size: 9pt; display: inline-block; }
            
            .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
            .info-item { background: rgba(255,255,255,0.95); color: black; padding: 8px 12px; border-radius: 10px; border-left: 4px solid #DC2626; }
            .label { font-size: 7pt; font-weight: 800; color: #7F1D1D; text-transform: uppercase; margin-bottom: 2px; }
            .val { font-size: 9pt; font-weight: 700; }
            
            .section-title { font-size: 10pt; font-weight: 700; margin: 15px 0 5px 2px; border-left: 3px solid white; padding-left: 10px; }
            .white-card { background: rgba(255,255,255,0.95); color: black; padding: 10px 15px; border-radius: 10px; font-size: 9pt; font-weight: 600; }
            
            .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
            .img-box { background: white; padding: 5px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
            .img-box img { width: 100%; height: 110px; object-fit: cover; border-radius: 4px; display: block; }
            .img-cap { font-size: 7pt; font-weight: 800; margin-top: 5px; color: #333; }
            
            .footer { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px; }
            .sig-area { text-align: center; }
            .sig-name { border-bottom: 1.5px solid white; margin-top: 45px; padding-bottom: 5px; font-weight: 700; font-size: 9pt; text-transform: uppercase; }
            .sig-role { font-size: 7pt; font-weight: 400; margin-top: 5px; opacity: 0.9; }
          </style>
        </head>
        <body onload="setTimeout(() => { window.print(); }, 500);">
          <div class="page-container">
            <div class="content">
              <img src="https://i.imgur.com/DLy3jZn.png" class="logo-pdf">
              <div class="text-center">
                <div class="header-title">LAPORAN AKTIVITI KOKURIKULUM</div>
                <div class="header-sub">SK BANDAR TUN HUSSEIN ONN 2</div>
                <div class="badge">UNIT: ${data.unit} (KALI KE-${data.kali})</div>
              </div>

              <div class="info-grid">
                <div class="info-item"><div class="label">Tarikh</div><div class="val">${data.tarikh}</div></div>
                <div class="info-item"><div class="label">Tempat</div><div class="val">${data.tempat}</div></div>
                <div class="info-item"><div class="label">Masa</div><div class="val">${data.masa}</div></div>
                <div class="info-item"><div class="label">Kehadiran</div><div class="val">${data.hadir} ORANG</div></div>
              </div>

              <div class="section-title">TAJUK AKTIVITI</div>
              <div class="white-card" style="text-transform: uppercase; color: #7F1D1D; font-size: 11pt;">${data.tajuk}</div>

              <div class="section-title">GURU PENASIHAT</div>
              <div class="white-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; font-size: 8pt;">
                  ${data.guru.map((g,i) => `<div>${i+1}. ${g}</div>`).join('')}
                </div>
              </div>

              <div class="section-title">GAMBAR AKTIVITI</div>
              <div class="img-grid">
                ${data.gambar.length > 0 ? data.gambar.map((src,i) => `
                  <div class="img-box">
                    <img src="${src}">
                    <div class="img-cap">GAMBAR AKTIVITI ${i+1}</div>
                  </div>
                `).join('') : '<div class="white-card" style="grid-column: span 2; text-align: center; opacity: 0.5;">Tiada Gambar Disertakan</div>'}
              </div>

              <div class="section-title">REFLEKSI & ULASAN</div>
              <div class="white-card" style="margin-bottom:8px; min-height: 40px;">${data.refleksi || 'Tiada refleksi.'}</div>
              <div class="white-card" style="min-height: 40px;">${data.ulasan || 'Tiada ulasan guru.'}</div>

              <div class="footer">
                <div class="sig-area">
                  <div style="font-size: 8pt; font-weight: 700;">Disediakan Oleh:</div>
                  <div class="sig-name">${data.murid || '........................................'}</div>
                  <div class="sig-role">SETIAUSAHA UNIT</div>
                </div>
                <div class="sig-area">
                  <div style="font-size: 8pt; font-weight: 700;">Disemak Oleh:</div>
                  <div class="sig-name">${data.penyemak || '........................................'}</div>
                  <div class="sig-role">GURU PENASIHAT</div>
                </div>
              </div>
            </div>
          </div>
        </body>
        </html>
      `);
      pdfWin.document.close();
    }

    document.getElementById('printBtn').onclick = generatePDFPreview;
    window.onload = generateGuruFields;
  </script>
</body>
</html>
